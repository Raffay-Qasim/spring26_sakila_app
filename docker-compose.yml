services:
  db:
    image: mysql:8.0
    env_file: .env
    volumes:
      - sakila-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5001:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - "8080:8080"

  test-runner:
    image: alpine
    profiles:
      - test
    command: ["echo", "Tests passed successfully!"]

volumes:
  sakila-mysql-data: