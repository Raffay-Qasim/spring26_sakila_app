name: Sakila CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v3
      - name: Install MySQL Client
        run: sudo apt-get install -y mysql-client
      - name: Download and Import Sakila DB
        run: |
          curl -L https://downloads.mysql.com/docs/sakila-db.tar.gz | tar xz
          mysql -h localhost -u root -padmin sakila < sakila-db/sakila-schema.sql
          mysql -h localhost -u root -padmin sakila < sakila-db/sakila-data.sql
      - name: Run Tests
        env:
          MYSQL_HOST: localhost
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: |
          pip install -r requirements.txt pytest
          pytest

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t sakila-app:latest .
      - name: Smoke Test Image
        run: docker run --rm sakila-app:latest python -c "print('App Image Boots Successfully')"

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sakila-app:latest'
          format: 'table'
          exit-code: 0
          severity: 'CRITICAL,HIGH'